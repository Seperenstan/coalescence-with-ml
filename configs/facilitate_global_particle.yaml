# Facilitate coalescence with a global policy: whole-lattice observation, the
# agent picks which particle to move and the reward favours merges.
variant: global_particle
facilitating: true
length: 15
n_particles: 15
training_episodes: 300
max_steps: 1000
seed: null
agent:
  hidden_dim: 128
  batch_size: 32
  gamma: 0.99
  lr: 0.001
  capacity: 10000
  update_rate: 1000
  eps_start: 1.0
  eps_end: 0.03
  eps_decay: 5000
  grad_clip: 50
