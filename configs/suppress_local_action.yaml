# Suppress coalescence with a local policy: the agent sees a window around one
# particle and chooses its step direction. The observation radius was swept over
# {1, 3, 5, 7}; radius 3 is shown here.
variant: local_action
facilitating: false
length: 15
n_particles: 15
obs_radius: 3
training_episodes: 300
max_steps: 1000
seed: null
agent:
  hidden_dim: 128
  batch_size: 32
  gamma: 0.99
  lr: 0.001
  capacity: 10000
  update_rate: 1200
  eps_start: 1.0
  eps_end: 0.05
  eps_decay: 6000
  grad_clip: 50
